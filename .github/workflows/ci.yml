name: CI Pipeline

on:
  push:
    branches: [ main ]

jobs:

  build:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install Python Dependencies
        run: |
          pip install flask requests pytest

      - name: Run Unit Tests
        run: |
          cd CICD-Assignment/unit-testing
          pytest

      - name: Run API Integration Tests
        run: |
          cd CICD-Assignment/api-testing
          python api.py &
          sleep 5
          pytest test_api.py

      - name: Install k6
        run: |
          sudo apt update
          sudo apt install -y k6

      - name: Run Performance Test
        run: |
          cd CICD-Assignment/performance-test
          k6 run loadtest.js