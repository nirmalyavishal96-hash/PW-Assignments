---
- name: Setup and configure nginx web server
  hosts: webservers
  become: yes

  tasks:

    - name: Install nginx
      apt:
        name: nginx
        state: present

    - name: Start nginx service
      service:
        name: nginx
        state: started
        enabled: yes

    - name: Deploy custom webpage
      copy:
        dest: /var/www/html/index.html
        content: "<h1>Web Server Configured using Ansible</h1>"